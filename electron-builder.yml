appId: com.mpaulreilly.trackerapp
productName: Project Tracker
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
  - package.json
# libSQL local file + settings live in Electron's userData dir, not packaged.

# Auto-update feed. electron-builder writes app-update.yml into the package from
# this, and electron-updater reads GitHub Releases for newer versions. A PUBLIC
# repo means installed apps download updates with no token; publishing releases
# still needs a GH_TOKEN (repo scope) — see `npm run release`.
# ⚠️ Set owner/repo to YOUR GitHub repo before the first release.
publish:
  provider: github
  owner: MaverickTheMad
  repo: trackerapp
  releaseType: release

# Assisted (wizard) installer rather than oneClick: it elevates cleanly, is far
# less likely to fail the shortcut step under antivirus/Controlled-Folder-Access,
# and surfaces the real error if it does. Still supports electron-updater.
nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  runAfterFinish: true

win:
  target:
    - nsis
mac:
  target:
    - dmg
linux:
  target:
    - AppImage
